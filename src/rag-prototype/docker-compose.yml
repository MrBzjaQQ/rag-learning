services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://raguser:ragpassword@postgres:5432/ragdb
      OPENAI_API_KEY: none
      OPENAI_BASE_URL: http://host.docker.internal:8033/v1
      OPENAI_API_KEY_EMBEDDINGS: none
      OPENAI_BASE_URL_EMBEDDINGS: http://host.docker.internal:8034/v1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads


  embedding-model:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: nomic-ai-embedding
    privileged: true
    restart: always
    volumes:
      - D:\\.lmstudio\\models\\nomic-ai\\nomic-embed-text-v2-moe-GGUF:/models
    ports:
      - "8034:8034"
    command: |
      -m "/models/nomic-embed-text-v2-moe.Q8_0.gguf"
      --jinja
      --flash-attn 1
      --fit on
      --port 8034
      --no-mmap
      --offline
      --embeddings

volumes:
  postgres_data:
